{% extends "base.html" %}

{% block title %}Password Reset Success{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card" style="text-align: center;">
        <h2 style="color: var(--color-success);">✅ Success!</h2>
        <p class="subtitle">Your password has been reset successfully.</p>
        <p>You can now login with your new password.</p>
        <a href="{{ url_for('login') }}" class="btn btn-primary" style="margin-top: 20px;">Go to Login</a>
    </div>
</div>
{% endblock %}
